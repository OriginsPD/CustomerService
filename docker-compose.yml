# ─────────────────────────────────────────────────────────────────────────────
# VCC — Development Docker Compose
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Hono API Server ──────────────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
      target: dev
    container_name: vcc-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "3001"
      CLIENT_URL: "http://localhost:5173"
      PUBLIC_URL: "http://localhost:5173"
      NODE_ENV: development
      # Polling fix for Windows/WSL
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "3001:3001"
    volumes:
      - ./server/src:/app/server/src
      - ./server/drizzle.config.ts:/app/server/drizzle.config.ts
      - ./packages/shared/src:/app/packages/shared/src
      # Mount root .env so server picks up credential changes
      - ./.env:/app/.env
      - ./logs:/app/logs
      - server_nm:/app/node_modules
      - server_dist:/app/server/dist
    networks:
      - vcc-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Vite Client ───────────────────────────────────────────────────────────────
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
      target: dev
    container_name: vcc-client
    restart: unless-stopped
    environment:
      VITE_API_TARGET: "http://server:3001"
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./client/src:/app/client/src
      - ./client/public:/app/client/public
      - ./client/index.html:/app/client/index.html
      - ./client/tailwind.config.js:/app/client/tailwind.config.js
      - ./client/postcss.config.js:/app/client/postcss.config.js
      - ./client/vite.config.ts:/app/client/vite.config.ts
      - ./client/tsconfig.json:/app/client/tsconfig.json
      - ./client/tsconfig.node.json:/app/client/tsconfig.node.json
      - ./packages/shared/src:/app/packages/shared/src
      - client_nm:/app/node_modules
      - client_src_nm:/app/client/node_modules
    networks:
      - vcc-net
    depends_on:
      server:
        condition: service_healthy

  # ── Drizzle Studio ────────────────────────────────────────────────────────────
  db-studio:
    build:
      context: .
      dockerfile: Dockerfile.server
      target: dev
    container_name: vcc-db-studio
    env_file:
      - .env
    ports:
      - "4983:4983"
    volumes:
      - ./server/src:/app/server/src
      - ./server/drizzle.config.ts:/app/server/drizzle.config.ts
      - ./.env:/app/.env
      - server_nm:/app/node_modules
    command: ["npm", "-w", "@vcc/server", "run", "db:studio"]
    networks:
      - vcc-net
    depends_on:
      server:
        condition: service_healthy

volumes:
  server_nm:
  server_dist:
  client_nm:
  client_src_nm:

networks:
  vcc-net:
    driver: bridge
